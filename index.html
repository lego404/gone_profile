<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Product Planner & Developer</title>
    <style>
        :root {
            --bg: #EFEFEF;
            --text: #111111;
            --border: rgba(17, 17, 17, 0.15);
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        }

        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .global-noise {
            position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .grid-lines { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        .line-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border); }
        .line-h { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); }

        .corner {
            position: absolute;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            z-index: 10; line-height: 1.3;
        }
        .top-left    { top: 2vw; left: 2vw; }
        .top-right   { top: 2vw; right: 2vw; text-align: right; }
        .bottom-left { bottom: 2vw; left: 2vw; }
        .bottom-right{ bottom: 2vw; right: 2vw; text-align: right; }

        .meta {
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 400;
            opacity: 0.5; margin-top: 4px; letter-spacing: 0;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; pointer-events: none;
            display: flex; align-items: center; justify-content: flex-end;
            padding: 4vw;
        }

        .info-panel {
            width: 460px;
            background: var(--bg);
            padding: 2.5rem;
            border: 1px solid var(--text);
            pointer-events: auto;
            transform: translateX(120%);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 16px 16px 0px rgba(17,17,17,0.08);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .info-panel::-webkit-scrollbar { display: none; }
        .info-panel::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .info-panel.active { transform: translateX(0); }

        .panel-header {
            font-size: 10px; font-weight: 700; font-family: var(--font-mono);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center;
            text-transform: uppercase;
        }
        .panel-title {
            font-size: 3.2rem; font-weight: 800; line-height: 0.9;
            margin: 0 0 0.75rem 0; letter-spacing: -0.04em; text-transform: uppercase;
            white-space: pre-line;
        }
        .panel-period {
            font-family: var(--font-mono); font-size: 10px;
            letter-spacing: 0.06em; opacity: 0.45;
            margin-bottom: 1.5rem; text-transform: uppercase;
            min-height: 1em;
        }
        .panel-body {
            font-size: 0.88rem; line-height: 1.7; font-weight: 400; color: #333;
            white-space: pre-line;
        }
        .panel-skills {
            margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 0.5rem;
            border-top: 1px solid var(--border); padding-top: 1.5rem;
        }
        .skill-tag {
            border: 1px solid var(--text); padding: 0.3rem 0.6rem;
            font-size: 10px; font-family: var(--font-mono); border-radius: 2px;
            text-transform: uppercase; background: transparent;
            transition: background 0.2s, color 0.2s; cursor: default;
        }
        .skill-tag:hover { background: var(--text); color: var(--bg); }

        .btn-close {
            background: none; border: none; font-family: var(--font-mono);
            font-size: 10px; cursor: pointer; padding: 0; color: var(--text);
            display: flex; align-items: center; gap: 4px;
        }
        .btn-close:hover { text-decoration: underline; }

        .instruction {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            text-align: center; font-size: 10px; font-weight: 700; font-family: var(--font-mono);
            letter-spacing: 0.1em; opacity: 0.4; z-index: 10; pointer-events: none;
            transition: opacity 0.4s; text-transform: uppercase;
        }
        .instruction.hidden { opacity: 0; }

        #cursor-data {
            position: fixed; pointer-events: none; z-index: 100;
            font-family: var(--font-mono); font-size: 10px;
            background: var(--text); color: var(--bg); padding: 4px 8px;
            opacity: 0; transition: opacity 0.2s; transform: translate(15px, 15px);
        }

        @media (max-width: 768px) {
            .ui-layer { align-items: flex-end; padding: 0; }
            .info-panel { width: 100%; transform: translateY(100%); box-shadow: none; border-left: none; border-right: none; border-bottom: none; }
            .info-panel.active { transform: translateY(0); }
            .panel-title { font-size: 2.4rem; }
            .corner { display: none; }
        }
    </style>
</head>
<body>
    <div class="global-noise"></div>

    <div class="grid-lines">
        <div class="line-v"></div>
        <div class="line-h"></div>
    </div>

    <header class="corner top-left">
        <div>PRODUCT PLANNER</div>
        <div class="meta">PLAN // DESIGN // BUILD</div>
    </header>
    <div class="corner top-right">
        <div>PORTFOLIO</div>
        <div class="meta">2024 — PRESENT</div>
    </div>
    <div class="corner bottom-left">
        <div id="status-label">SYS.READY</div>
        <div class="meta" id="coord-label">COORD: X.00 Y.00</div>
    </div>
    <div class="corner bottom-right">
        <div>INTERACTIVE MAP</div>
        <div class="meta">HOVER NODES TO EXPLORE</div>
    </div>

    <div class="instruction" id="inst">[ HOVER AND CLICK NODES TO EXPLORE ]</div>
    <div id="cursor-data">NODE_DETECTED</div>

    <div id="canvas-container"></div>

    <main class="ui-layer">
        <article class="info-panel" id="panel">
            <header class="panel-header">
                <span id="p-phase">PHASE.00 // INIT</span>
                <button class="btn-close" id="btn-close">[X] CLOSE</button>
            </header>
            <h1 class="panel-title" id="p-title">—</h1>
            <div class="panel-period" id="p-period"></div>
            <div class="panel-body" id="p-body"></div>
            <div class="panel-skills" id="p-skills"></div>
        </article>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const portfolioData = [
            {
                id: 0,
                title: 'PRODUCT\nSTRATEGY',
                phase: 'PHASE.01 // PLANNING',
                period: '',
                body: '서비스 기획은 아이디어를 내는 일이 아니라, 구조를 설계하는 일입니다.\n\n복잡한 사용자 흐름을 처음부터 끝까지 정리하고, 정보 구조를 정의하며, 비즈니스 목표를 실행 가능한 서비스 청사진으로 변환합니다. 화면 하나, 인터랙션 하나, 예외 케이스 하나까지 — 픽셀이나 코드가 등장하기 전에 모두 명확히 정의된 상태여야 합니다.\n\n요구사항 수집부터 최종 스펙 완성까지, 모든 과정은 의도적이고 추적 가능하게 진행됩니다.',
                skills: ['서비스 플로우 설계', '정보 구조 설계', '사용자 여정 매핑', '와이어프레임', 'Figma / FigJam', 'Photoshop']
            },
            {
                id: 1,
                title: 'MEDI\nKNOCKS',
                phase: 'PHASE.02 // HEALTHCARE',
                period: 'APR 2024 — SEP 2025  ·  미국 원격 의료 서비스',
                body: '미국 원격 의료 플랫폼의 기획부터 배포까지 전 과정을 담당했습니다. 환자는 앱으로, 의사는 웹으로 접속해 채팅 기반 실시간 진료를 진행하는 서비스입니다.\n\n[ 기획 ]\n요구사항 정의 → 전체 서비스 플로우차트 작성 → 화면 설계서 작성 → 간트차트로 일정 산출. 변경 사항 발생 시 기존·변경 기능과 변경 이유를 함께 문서화해 개발팀이 납득할 수 있는 형태로 전달했습니다.\n\n[ 개발 ]\n환자-의사 매칭 및 개별 대화방 생성 백엔드 구현, Sendbird API 채팅방 상태 관리, 환자·의사·진료·결제 DB 설계 및 관리, AWS 서버 연결 및 도메인 설정.',
                skills: ['요구사항 정의', '플로우차트 · 화면 설계서', '간트차트', '환자-의사 매칭 백엔드', 'Sendbird API', 'DB 설계 및 관리', 'Node.js / Express', 'AWS']
            },
            {
                id: 2,
                title: 'H2G',
                phase: 'PHASE.03 // VETERINARY',
                period: 'DEC 2025 — PRESENT  ·  재직 중',
                body: '대동물 수의사 대상 진료 기록 플랫폼. 제로베이스에서 기획 전 과정을 담당하고 있습니다.\n\n[ 시장 조사 & 문제 정의 ]\n수의사와 농장주의 의견을 다양한 매체에서 수집해 현장의 문제점을 정의했습니다. 추출한 문제들을 유사한 것끼리 큰 틀로 묶고, 묶음별로 해결 방안을 제시해 타깃과 핵심 기능을 설정했습니다.\n\n[ 기획 프로세스 ]\n기능 정의를 바탕으로 IA(메뉴 구조도)로 전체 메뉴 체계를 설계하고, 플로우차트로 세부 정책과 예외 케이스를 보완했습니다. 화면 설계서에는 디자인 방향과 각 화면별 기능을 함께 기록해 개발·디자인 양쪽에 명확한 기준을 제공했습니다.',
                skills: ['시장 조사 · 문제 정의', '타깃 설정 · 기능 정의', 'IA (메뉴 구조도)', '플로우차트', '화면 설계서', 'App + Web UI/UX']
            },
            {
                id: 3,
                title: 'TECH\nSTACK',
                phase: 'PHASE.04 // CAPABILITIES',
                period: '',
                body: '기획부터 프로덕션 서버까지 — 직접 사용하는 도구들입니다.\n\n기획 환경은 구조와 소통을 위해, 개발 환경은 실행과 배포를 위해 활용합니다. 와이어프레임을 그린 사람이 백엔드를 짜고 서버를 올립니다. 전달 과정에서의 손실이 없습니다.',
                skills: ['React', 'Node.js / Express', 'MongoDB', 'MySQL', 'Figma / Photoshop', 'Sendbird API', 'AWS EC2 + Route 53']
            }
        ];

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const vertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const fragmentShader = `
            #ifdef GL_ES
            precision highp float;
            #endif
            uniform vec2 u_resolution;
            uniform float u_time;
            uniform float u_hoverState[4];
            varying vec2 vUv;
            #define PI 3.14159265359

            float hash(vec2 p) { return fract(1e4 * sin(17.0 * p.x + p.y * 0.1) * (0.1 + abs(sin(p.y * 13.0 + p.x)))); }
            float noise(vec2 x) {
                vec2 i = floor(x); vec2 f = fract(x);
                float a = hash(i); float b = hash(i + vec2(1.0, 0.0));
                float c = hash(i + vec2(0.0, 1.0)); float d = hash(i + vec2(1.0, 1.0));
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }
            float sdCircle(vec2 p, float r) { return length(p) - r; }
            float sdBox(vec2 p, vec2 b) { vec2 d = abs(p)-b; return length(max(d,0.0)) + min(max(d.x,d.y),0.0); }

            vec3 cBg = vec3(0.937);
            vec3 cBlue = vec3(0.12, 0.53, 0.90);
            vec3 cPink = vec3(1.0, 0.4, 0.7);
            vec3 cYellow = vec3(1.0, 0.83, 0.31);
            vec3 cDark = vec3(0.05);

            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                vec2 st = uv * 2.0 - 1.0;
                st.x *= u_resolution.x / u_resolution.y;
                vec3 color = cBg;
                float scale = 0.6;
                vec2 p0 = vec2(0.0, 0.4) * scale;
                vec2 p1 = vec2(0.4, 0.0) * scale;
                vec2 p2 = vec2(0.0, -0.4) * scale;
                vec2 p3 = vec2(-0.4, 0.0) * scale;
                float rBase = 0.3 * scale;
                float r0 = rBase + (u_hoverState[0] * 0.08);
                float r1 = rBase + (u_hoverState[1] * 0.08);
                float r2 = rBase + (u_hoverState[2] * 0.08);
                float r3 = rBase + (u_hoverState[3] * 0.08);
                float d0 = sdCircle(st - p0, r0);
                float d1 = sdCircle(st - p1, r1);
                float d2 = sdCircle(st - p2, r2);
                float d3 = sdCircle(st - p3, r3);
                vec2 stRot = mat2(cos(PI/4.), -sin(PI/4.), sin(PI/4.), cos(PI/4.)) * st;
                float dCenter = sdBox(stRot, vec2(0.3 * scale, 0.08 * scale)) - 0.03;
                float dLobes = min(min(d0, d1), min(d2, d3));
                if (dLobes < 0.0) {
                    vec3 finalCol = vec3(0.0);
                    vec2 v0 = (st - p0) / r0; vec2 v1 = (st - p1) / r1;
                    vec2 v2 = (st - p2) / r2; vec2 v3 = (st - p3) / r3;
                    vec3 col0 = mix(cPink, cBlue, smoothstep(-0.5, 0.5, v0.y));
                    vec3 col1 = mix(cDark, cBlue, smoothstep(-0.5, 0.5, v1.x + v1.y));
                    vec3 col2 = mix(cYellow, cPink, smoothstep(-0.5, 0.5, v2.x));
                    vec3 col3 = mix(cDark, cYellow, smoothstep(-0.5, 0.5, -v3.x + v3.y));
                    float w0 = max(0.0, 1.0 - length(st - p0)/r0);
                    float w1 = max(0.0, 1.0 - length(st - p1)/r1);
                    float w2 = max(0.0, 1.0 - length(st - p2)/r2);
                    float w3 = max(0.0, 1.0 - length(st - p3)/r3);
                    float wTotal = w0 + w1 + w2 + w3;
                    if (wTotal > 0.0) { finalCol = (col0*w0 + col1*w1 + col2*w2 + col3*w3) / wTotal; }
                    float centerDist = length(st);
                    finalCol = mix(finalCol, cDark, smoothstep(0.4 * scale, 0.0, centerDist) * 0.8);
                    float grain = noise(gl_FragCoord.xy * 2.0);
                    finalCol -= grain * 0.2;
                    finalCol.r += noise(gl_FragCoord.xy * 1.5 + vec2(100.)) * 0.05;
                    float edge = smoothstep(0.0, -0.003, dLobes);
                    color = mix(color, finalCol, edge);
                }
                if (dCenter < 0.0) {
                    vec3 pillCol = cDark;
                    pillCol -= noise(gl_FragCoord.xy * 2.5) * 0.15;
                    float edge = smoothstep(0.0, -0.002, dCenter);
                    color = mix(color, pillCol, edge);
                }
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const geometry = new THREE.PlaneGeometry(2, 2);
        const uniforms = {
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_time: { value: 0 },
            u_hoverState: { value: [0.0, 0.0, 0.0, 0.0] }
        };
        const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const mouse = new THREE.Vector2();
        let targetHover = [0, 0, 0, 0];
        let currentHover = [0, 0, 0, 0];

        const cursorData = document.getElementById('cursor-data');
        const coordLabel = document.getElementById('coord-label');
        const statusLabel = document.getElementById('status-label');
        const panel = document.getElementById('panel');
        const inst = document.getElementById('inst');

        const getNodes = () => {
            const aspect = window.innerWidth / window.innerHeight;
            const scale = 0.6;
            return [
                { id: 0, x: 0.0,          y:  0.4 * scale / aspect },
                { id: 1, x:  0.4 * scale,  y:  0.0 },
                { id: 2, x: 0.0,          y: -0.4 * scale / aspect },
                { id: 3, x: -0.4 * scale,  y:  0.0 }
            ];
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            coordLabel.innerText = `COORD: ${mouse.x.toFixed(2)} ${mouse.y.toFixed(2)}`;

            const aspect = window.innerWidth / window.innerHeight;
            const mAdj = { x: mouse.x * aspect, y: mouse.y };
            const nodes = getNodes();
            const radius = 0.3 * 0.6;
            let hoveredId = -1;

            for (let i = 0; i < nodes.length; i++) {
                const dist = Math.hypot(mAdj.x - nodes[i].x, mAdj.y - nodes[i].y);
                if (dist < radius) { hoveredId = i; break; }
            }

            targetHover = [0, 0, 0, 0];
            if (hoveredId !== -1) {
                targetHover[hoveredId] = 1.0;
                document.body.style.cursor = 'crosshair';
                cursorData.style.opacity = '1';
                cursorData.style.left = e.clientX + 'px';
                cursorData.style.top = e.clientY + 'px';
                cursorData.innerText = portfolioData[hoveredId].phase;
                statusLabel.innerText = 'NODE_DETECTED';
            } else {
                document.body.style.cursor = 'default';
                cursorData.style.opacity = '0';
                statusLabel.innerText = 'SYS.READY';
            }
        });

        window.addEventListener('click', () => {
            const idx = targetHover.findIndex(v => v === 1.0);
            if (idx !== -1) openPanel(idx);
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            panel.classList.remove('active');
            inst.classList.remove('hidden');
        });

        function openPanel(id) {
            const data = portfolioData[id];
            document.getElementById('p-phase').innerText = data.phase;
            document.getElementById('p-title').innerText = data.title;
            document.getElementById('p-period').innerText = data.period;
            document.getElementById('p-body').innerText = data.body;
            const sc = document.getElementById('p-skills');
            sc.innerHTML = '';
            data.skills.forEach(s => {
                const el = document.createElement('span');
                el.className = 'skill-tag';
                el.innerText = s;
                sc.appendChild(el);
            });
            panel.classList.add('active');
            inst.classList.add('hidden');
        }

        window.addEventListener('resize', () => {
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            for (let i = 0; i < 4; i++) {
                currentHover[i] += (targetHover[i] - currentHover[i]) * 0.1;
            }
            uniforms.u_hoverState.value = currentHover;
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
